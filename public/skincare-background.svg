<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Soft skincare routine background</title>
  <desc id="desc">A soft tabletop composition with skincare bottles, serum droppers, cream jars, and botanical shadows.</desc>
  <defs>
    <linearGradient id="surface" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f9fbf8"/>
      <stop offset="0.48" stop-color="#f3eee9"/>
      <stop offset="1" stop-color="#eef6f5"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#d8ece7" stop-opacity="0.82"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7d19b"/>
      <stop offset="1" stop-color="#b77a4f"/>
    </linearGradient>
    <filter id="softShadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="28" dy="36" stdDeviation="28" flood-color="#867970" flood-opacity="0.16"/>
    </filter>
    <filter id="blurred" x="-20%" y="-20%" width="140%" height="140%">
