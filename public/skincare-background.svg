      <circle cx="62" cy="148" r="0.8" fill="#a7b8b1" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="1800" height="1200" fill="url(#surface)"/>
  <rect width="1800" height="1200" fill="url(#grain)" opacity="0.5"/>
  <g opacity="0.55" filter="url(#blurred)">
